[build]
  publish = "build"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 3000
  publish = "build"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "max-age=31536000, immutable"

# Handle 3D model files
[[headers]]
  for = "*.ply"
  [headers.values]
    Content-Type = "application/octet-stream"
    Cache-Control = "max-age=31536000, immutable"

[[headers]]
  for = "*.stl"
  [headers.values]
    Content-Type = "application/octet-stream"
    Cache-Control = "max-age=31536000, immutable"

[[headers]]
  for = "*.glb"
  [headers.values]
    Content-Type = "model/gltf-binary"
    Cache-Control = "max-age=31536000, immutable"

[[headers]]
  for = "*.gltf"
  [headers.values]
    Content-Type = "model/gltf+json"
    Cache-Control = "max-age=31536000, immutable"

[[headers]]
  for = "*.hdr"
  [headers.values]
    Content-Type = "application/octet-stream"
    Cache-Control = "max-age=31536000, immutable"